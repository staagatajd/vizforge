<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="forgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dd1818"/>
      <stop offset="100%" style="stop-color:#999999"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dd1818;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#dd1818;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- diamond/forge icon -->
  <g transform="translate(190, 150)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- outer diamond -->
    <polygon points="0,-60 52,0 0,60 -52,0" fill="none" stroke="#dd1818" stroke-width="2" style="fill:none;stroke:rgb(221, 24, 24);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- inner diamond -->
    <polygon points="0,-36 31,0 0,36 -31,0" fill="#dd1818" opacity="0.15" style="fill:rgb(221, 24, 24);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- array bars inside -->
    <rect x="-18" y="-18" width="10" height="36" rx="2" fill="#dd1818" opacity="0.9" style="fill:rgb(221, 24, 24);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <rect x="-5" y="-26" width="10" height="52" rx="2" fill="#dd1818" opacity="0.7" style="fill:rgb(221, 24, 24);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <rect x="8" y="-12" width="10" height="24" rx="2" fill="#999999" opacity="0.8" style="fill:rgb(153, 153, 153);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- highlight dot top -->
    <circle cx="0" cy="-60" r="3" fill="#dd1818" style="fill:rgb(221, 24, 24);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="52" cy="0" r="3" fill="#dd1818" opacity="0.5" style="fill:rgb(221, 24, 24);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="0" cy="60" r="3" fill="#999999" style="fill:rgb(153, 153, 153);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="-52" cy="0" r="3" fill="#999999" opacity="0.5" style="fill:rgb(153, 153, 153);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- wordmark -->
  <text x="262" y="134" font-family="helvetica, sans-serif" font-weight="700" font-size="72" fill="white" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:helvetica, sans-serif;font-size:72px;font-weight:700;text-anchor:start;dominant-baseline:auto">Viz</text>
  <text x="370" y="134" font-family="helvetica, sans-serif" font-weight="700" font-size="72" fill="url(#forgeGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:helvetica, sans-serif;font-size:72px;font-weight:700;text-anchor:start;dominant-baseline:auto">Forge</text>

  <!-- tagline -->
  <text x="263" y="165" font-family="monospace" font-size="14" fill="#ffffff" opacity="0.4" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:monospace;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">Paste a problem. See it think.</text>
</svg>